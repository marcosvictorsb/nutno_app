  <path d="M 45 50 Q 38 60, 32 75" stroke="#14532d" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Veias laterais direita -->
  <path d="M 55 20 Q 65 30, 68 45" stroke="#14532d" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 55 30 Q 65 40, 68 55" stroke="#14532d" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 55 40 Q 65 50, 68 65" stroke="#14532d" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 55 50 Q 62 60, 68 75" stroke="#14532d" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
